devices: ({
  name: "LIFT VERTICAL ERGONOMIC MOUSE";
  dpi: 2400;
  buttons: ({
    cid: 0xd7;
    action: {
      type: "Gestures";
      gestures: (
        {
          direction: "None";
          mode: "OnRelease";
          action: {
            type: "Keypress";
            keys: ["BTN_MIDDLE"];
          };
        },
        {
          direction: "Right";
          mode: "OnRelease";
          action: {
            type: "Keypress";
            keys: ["KEY_LEFTCTRL", "KEY_TAB"];
          };
        },
        {
          direction: "Left";
          mode: "OnRelease";
          action: {
            type: "Keypress";
            keys: ["KEY_LEFTCTRL", "KEY_LEFTSHIFT", "KEY_TAB"];
          };
        },
        {
          direction: "Up";
          mode: "OnInterval";
          threshold: 50;
          action: {
            type: "Keypress";
            keys: ["KEY_VOLUMEUP"];
          };
        },
        {
          direction: "Down";
          mode: "OnInterval";
          threshold: 50;
          action: {
            type: "Keypress";
            keys: ["KEY_VOLUMEDOWN"];
          };
        }
      );
    };
  });
});
